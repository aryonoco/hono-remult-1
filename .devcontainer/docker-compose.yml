name: hono-remult-1

networks:
  hrm-net:
    name: hrm-net

services:
  dev:
    container_name: hono-remult-1
    hostname: hono-remult-1
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    init: true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, DAC_OVERRIDE]
    security_opt: [no-new-privileges:true]
    networks: [hrm-net]
    volumes:
      - ..:/workspaces/hono-remult-1:cached
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DB connection strings live in .env (single source of truth, also
      # consumed outside the dev container). docker-compose intentionally
      # does not set DATABASE_URL — shell env would otherwise override .env.
      - TZ=UTC
    command: sleep infinity

  postgres:
    image: postgres:18.4-alpine
    container_name: hrm-postgres
    hostname: postgres
    restart: unless-stopped
    networks: [hrm-net]
    environment:
      POSTGRES_DB: hono_remult_dev
      POSTGRES_USER: hrm_app
      POSTGRES_PASSWORD: hrm_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8 --data-checksums --auth-host=scram-sha-256 --auth-local=scram-sha-256"
      TZ: UTC
      PGTZ: UTC
    command:
      - postgres
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "min_wal_size=80MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_destination=stderr"
      - "-c"
      - "log_min_duration_statement=200"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "log_line_prefix=%m [%p] %q%u@%d"
      - "-c"
      - "log_timezone=UTC"
      - "-c"
      - "timezone=UTC"
    volumes:
      - hrm-pg-data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrm_app -d hono_remult_dev || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb
    stop_grace_period: 30s
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, FOWNER, DAC_OVERRIDE]
    security_opt: [no-new-privileges:true]

volumes:
  hrm-pg-data:
