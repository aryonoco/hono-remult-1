<a href="#main" class="skip-link">Skip to content</a>

<mat-toolbar class="appbar">
  @if (isHandset()) {
    <button
      matIconButton
      type="button"
      class="appbar__menu"
      aria-label="Toggle navigation"
      (click)="drawer.toggle()"
    >
      <mat-icon>menu</mat-icon>
    </button>
  }
  <span class="appbar__brand">
    <mat-icon class="appbar__logo" aria-hidden="true">local_fire_department</mat-icon>
    <span class="appbar__title">Fire Incidents</span>
  </span>
  <span class="appbar__spacer"></span>
  <app-theme-toggle />
  <app-dev-user-switcher />
</mat-toolbar>

<mat-sidenav-container class="shell">
  <mat-sidenav
    #drawer
    class="sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <nav aria-label="Primary" class="nav">
      <p class="nav__section">Operations</p>
      <mat-nav-list>
        <a
          mat-list-item
          routerLink="/incidents"
          routerLinkActive
          #incidentsLink="routerLinkActive"
          [activated]="incidentsLink.isActive"
        >
          <mat-icon matListItemIcon aria-hidden="true">local_fire_department</mat-icon>
          <span matListItemTitle>Incidents</span>
        </a>
      </mat-nav-list>
    </nav>

    @if (currentUser(); as user) {
      <div class="userchip">
        <span class="userchip__avatar" aria-hidden="true">{{ initials(user.name) }}</span>
        <span class="userchip__meta">
          <span class="userchip__name">{{ user.name }}</span>
          <span class="userchip__role">
            {{ roleLabel(user) }} <span class="userchip__district">· {{ districtLabel(user) }}</span>
          </span>
        </span>
      </div>
    } @else {
      <div class="userchip userchip--empty">Not signed in</div>
    }
  </mat-sidenav>

  <mat-sidenav-content>
    <main id="main" class="main" tabindex="-1">
      <div class="content content--{{ contentWidth() }}">
        <router-outlet />
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
