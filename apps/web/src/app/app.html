<main class="mx-auto max-w-lg p-8">
  <h1 class="mb-6 text-2xl font-bold">Tasks</h1>

  <form (submit)="addTask()" class="mb-6 flex gap-2">
    <input
      [(ngModel)]="newTaskTitle"
      name="newTaskTitle"
      placeholder="New task..."
      class="flex-1 rounded border px-3 py-2"
    />
    <button type="submit" class="rounded bg-blue-600 px-4 py-2 text-white">
      Add
    </button>
  </form>

  @for (task of tasks(); track task.id) {
    <div class="mb-2 flex items-center gap-3 rounded border p-3">
      <input
        type="checkbox"
        [checked]="task.completed"
        (change)="toggleCompleted(task)"
      />
      <span [class.line-through]="task.completed" class="flex-1">
        {{ task.title }}
      </span>
      <button
        (click)="deleteTask(task)"
        class="text-red-600 hover:text-red-800"
      >
        Delete
      </button>
    </div>
  } @empty {
    <p class="text-gray-500">No tasks yet. Add one above!</p>
  }
</main>

<router-outlet />
