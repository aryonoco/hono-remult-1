<a
  href="#main"
  class="sr-only focus:not-sr-only focus:absolute focus:left-2 focus:top-2 focus:z-50 focus:rounded focus:bg-white focus:px-3 focus:py-2"
>
  Skip to content
</a>

<mat-toolbar class="flex items-center gap-4">
  <span>Fire Incidents</span>
  <span class="flex-1"></span>
  <app-theme-toggle />
  <app-dev-user-switcher />
</mat-toolbar>

<mat-sidenav-container class="flex-1">
  <mat-sidenav [mode]="isHandset() ? 'over' : 'side'" [opened]="!isHandset()">
    <mat-nav-list>
      <a mat-list-item routerLink="/incidents">Incidents</a>
    </mat-nav-list>
    @if (currentUser(); as user) {
      <div class="p-4 text-xs opacity-70">Signed in as {{ user.name }}</div>
    } @else {
      <div class="p-4 text-xs opacity-70">Not signed in</div>
    }
  </mat-sidenav>
  <mat-sidenav-content>
    <main id="main" class="p-4">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
